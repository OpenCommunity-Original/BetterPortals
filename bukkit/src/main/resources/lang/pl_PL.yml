# Command translations
commands:
  betterportals_reload:
    description: "Przeładowuje plugin i plik konfiguracyjny"
  betterportals_reconnect:
    description: "Łączy ponownie z proxy w przypadku rozłączenia"
  betterportals_removebyname:
    description: "Usuwa wszystkie portale o podanej nazwie"
  betterportals_createfromcoords:
    description: "Tworzy portal ze współrzędnych jego rogów bez udziału gracza"
  betterportals_remove:
    description: "Usuwa najbliższy portal w promieniu 20 bloków od gracza"
  betterportals_setOrigin:
    description: "Ustawia bieżące zaznaczenie różdżki jako pozycję źródłową"
  betterportals_setDestination:
    description: "Ustawia bieżące zaznaczenie różdżki jako pozycję docelową"
  betterportals_linkPortals:
    description: "Łączy ze sobą portal źródłowy i docelowy"
  betterportals_linkExternalPortals:
    description: "Łączy zaznaczenie źródłowe na tym serwerze z celem na innym serwerze"
  betterportals_wand:
    description: "Daje różdżkę do zaznaczania portali"
  betterportals_setPortalName:
    description: "Ustawia nazwę najbliższego portalu w promieniu 20 bloków"
  betterportals_getportalname:
    description: "Pokazuje nazwę najbliższego portalu w promieniu 20 bloków"
  betterportals_getallowNonPlayerTeleportation:
    description: "Pokazuje, czy najbliższy portal w promieniu 20 bloków pozwala na teleportację przedmiotów"
  betterportals_setAllowNonPlayerTeleportation:
    description: "Ustawia, czy najbliższy portal w promieniu 20 bloków pozwala na teleportację przedmiotów"
  betterportals_setseethroughportal:
    description: "Ustawia, czy gracz może widzieć, co jest po drugiej stronie portalu"
  betterportals_toggleseethroughportal:
    description: "Przełącza, czy gracz może widzieć, co jest po drugiej stronie portalu"
  betterportals_menu:
    description: "Otwiera menu administracyjne portali GUI"
  betterportals_setprice:
    description: "Ustawia cenę najbliższego portalu"
  betterportals_setpreset:
    description: "Ustawia efekt wizualny najbliższego portalu"

