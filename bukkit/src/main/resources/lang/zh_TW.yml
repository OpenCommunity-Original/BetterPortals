    description: "將起點傳送門與終點傳送門連結在一起"
  betterportals_linkExternalPortals:
    description: "將此伺服器上的起點選取與另一個伺服器上的終點連結"
  betterportals_wand:
    description: "給予您用於選取傳送門的魔杖"
  betterportals_setPortalName:
    description: "設定 20 格範圍內最近的傳送門的名稱"
  betterportals_getportalname:
    description: "告訴您 20 格範圍內最近的傳送門的名稱"
