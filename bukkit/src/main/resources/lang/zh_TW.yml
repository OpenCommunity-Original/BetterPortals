    description: "告訴您 20 格範圍內最近的傳送門是否允許物品傳送"
  betterportals_setAllowNonPlayerTeleportation:
    description: "設定 20 格範圍內最近的傳送門是否允許物品傳送"
  betterportals_setseethroughportal:
    description: "設定當前玩家是否能夠看到傳送門另一側的情況。"
  betterportals_toggleseethroughportal:
    description: "切換當前玩家是否能夠看到傳送門另一側的情況。"
