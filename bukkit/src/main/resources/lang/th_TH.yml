seeThroughPortalEnabled: "เนเธอร์พอร์ทัลที่มีสิทธิ์ทั้งหมดจะแสดงให้คุณเห็นสิ่งที่อยู่อีกฝั่งหนึ่งแล้ว"
noPortalsWithName: "<red>ไม่มีพอร์ทัลชื่อ {name} อยู่</red>"
noWorldLink: "<red>ขออภัย พอร์ทัลนี้จะไม่ทำงานเนื่องจากโลกที่คุณอยู่ไม่ได้เชื่อมต่อกัน</red>\nหากคุณเชื่อว่านี่เป็นข้อผิดพลาด โปรดติดต่อผู้ดูแลระบบและแชร์ลิงก์วิกินี้: https://github.com/OpenCommunity-Original/BetterPortals/wiki/Editing-the-Config-file#world-connections"
