# Command translations
commands:
  betterportals_reload:
    description: "โหลดปลั๊กอินและไฟล์กำหนดค่าใหม่"
  betterportals_reconnect:
    description: "เชื่อมต่อกับพร็อกซีอีกครั้งหากตัดการเชื่อมต่อ"
  betterportals_removebyname:
    description: "ลบพอร์ทัลทั้งหมดด้วยชื่อที่กำหนด"
  betterportals_createfromcoords:
    description: "สร้างพอร์ทัลจากพิกัดของมุมโดยไม่ต้องใช้ผู้เล่น"
  betterportals_remove:
    description: "ลบพอร์ทัลที่ใกล้ที่สุดภายในระยะ 20 บล็อกของผู้เล่น"
  betterportals_setOrigin:
    description: "ตั้งค่าการเลือกไม้พอร์ทัลปัจจุบันเป็นตำแหน่งต้นทางของคุณ"
  betterportals_setDestination:
    description: "ตั้งค่าการเลือกไม้พอร์ทัลปัจจุบันเป็นตำแหน่งปลายทางของคุณ"
  betterportals_linkPortals:
    description: "เชื่อมโยงพอร์ทัลต้นทางและปลายทางเข้าด้วยกัน"
  betterportals_linkExternalPortals:
    description: "เชื่อมโยงการเลือกต้นทางในเซิร์ฟเวอร์นี้กับปลายทางในเซิร์ฟเวอร์อื่น"
  betterportals_wand:
    description: "ให้ไม้กายสิทธิ์แก่คุณเพื่อเลือกพอร์ทัล"
  betterportals_setPortalName:
    description: "ตั้งชื่อพอร์ทัลที่ใกล้ที่สุดภายในระยะ 20 บล็อก"
  betterportals_getportalname:
    description: "บอกชื่อพอร์ทัลที่ใกล้ที่สุดภายในระยะ 20 บล็อกให้คุณทราบ"
  betterportals_getallowNonPlayerTeleportation:
    description: "บอกคุณว่าพอร์ทัลที่ใกล้ที่สุดภายในระยะ 20 บล็อกอนุญาตให้ส่งไอเทมหรือไม่"
  betterportals_setAllowNonPlayerTeleportation:
    description: "ตั้งค่าว่าพอร์ทัลที่ใกล้ที่สุดภายในระยะ 20 บล็อกจะอนุญาตให้ส่งไอเทมหรือไม่"
  betterportals_setseethroughportal:
    description: "ตั้งค่าว่าผู้เล่นปัจจุบันสามารถมองทะลุผ่านพอร์ทัลได้หรือไม่"
  betterportals_toggleseethroughportal:
    description: "สลับการมองทะลุผ่านพอร์ทัลสำหรับผู้เล่นปัจจุบัน"
  betterportals_menu:
    description: "เปิดเมนู GUI ผู้ดูแลพอร์ทัล"
  betterportals_setprice:
    description: "ตั้งราคาค่าผ่านทางของพอร์ทัลที่ใกล้ที่สุด"
  betterportals_setpreset:
    description: "ตั้งค่าเอฟเฟกต์สำหรับพอร์ทัลที่ใกล้ที่สุด"

