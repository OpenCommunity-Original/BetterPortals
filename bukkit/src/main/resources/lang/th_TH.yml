horizontalIssues: "<yellow>คำเตือน: พอร์ทัลแนวนอนที่มีทิศทางต้นทาง/ปลายทางต่างกันอาจทำให้เกิดปัญหากับการหมุนบล็อก - บล็อกบางบล็อกไม่สามารถหมุนได้ในทุกทิศทาง</yellow>"
