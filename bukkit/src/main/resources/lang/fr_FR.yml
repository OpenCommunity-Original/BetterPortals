# Command translations
commands:
  betterportals_reload:
    description: "Recharge le plugin et le fichier de configuration"
  betterportals_reconnect:
    description: "Reconnecte le serveur au proxy s'il est déconnecté"
  betterportals_removebyname:
    description: "Supprime tous les portails portant le nom donné"
  betterportals_createfromcoords:
    description: "Crée un portail à partir des coordonnées de ses coins sans nécessiter de joueur"
  betterportals_remove:
    description: "Supprime le portail le plus proche dans un rayon de 20 blocs du joueur"
  betterportals_setOrigin:
    description: "Définit la sélection actuelle de la baguette de portail comme position d'origine"
  betterportals_setDestination:
    description: "Définit la sélection actuelle de la baguette de portail comme position de destination"
  betterportals_linkPortals:
    description: "Lie le portail d'origine et de destination ensemble"
  betterportals_linkExternalPortals:
    description: "Lie la sélection d'origine sur ce serveur avec une destination sur un autre serveur"
  betterportals_wand:
    description: "Vous donne la baguette de sélection de portails"
  betterportals_setPortalName:
    description: "Définit le nom du portail le plus proche dans un rayon de 20 blocs"
  betterportals_getportalname:
    description: "Affiche le nom du portail le plus proche dans un rayon de 20 blocs"
  betterportals_getallowNonPlayerTeleportation:
    description: "Indique si le portail le plus proche permet ou non la téléportation d'objets"
  betterportals_setAllowNonPlayerTeleportation:
    description: "Définit si le portail le plus proche permet ou non la téléportation d'objets"
  betterportals_setseethroughportal:
    description: "Définit si le joueur actuel peut voir à travers les portails"
  betterportals_toggleseethroughportal:
    description: "Bascule la visibilité à travers les portails pour le joueur actuel"
  betterportals_menu:
    description: "Ouvre le menu GUI de l'administration des portails"
  betterportals_setprice:
    description: "Définit le prix du portail le plus proche"
  betterportals_setpreset:
    description: "Définit le préréglage d'effet du portail le plus proche"

