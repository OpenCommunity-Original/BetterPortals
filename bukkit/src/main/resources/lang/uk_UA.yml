# Command translations
commands:
  betterportals_reload:
    description: "Перезавантажує конфігурацію та плагін"
  betterportals_reconnect:
    description: "Перепідключається до проксі-сервера в разі обриву"
  betterportals_removebyname:
    description: "Видаляє всі портали з вказаним ім'ям"
  betterportals_createfromcoords:
    description: "Створює портал за координатами кутів без участі гравця"
  betterportals_remove:
    description: "Видаляє найближчий портал в радіусі 20 блоків"
  betterportals_setOrigin:
    description: "Встановлює поточне виділення паличкою як точку відправлення"
  betterportals_setDestination:
    description: "Встановлює поточне виділення паличкою як точку призначення"
  betterportals_linkPortals:
    description: "Зв'язує вибрані точки відправлення та призначення"
  betterportals_linkExternalPortals:
    description: "Зв'язує точку відправлення на цьому сервері з точкою призначення на іншому"
  betterportals_wand:
    description: "Видає інструмент (паличку) для виділення порталів"
  betterportals_setPortalName:
    description: "Встановлює ім'я для найближчого порталу в радіусі 20 блоків"
  betterportals_getportalname:
    description: "Показує ім'я найближчого порталу в радіусі 20 блоків"
  betterportals_getallowNonPlayerTeleportation:
    description: "Показує, чи дозволено телепорт мобів/предметів через найближчий портал"
  betterportals_setAllowNonPlayerTeleportation:
    description: "Налаштовує дозвіл на телепорт мобів/предметів через найближчий портал"
  betterportals_setseethroughportal:
    description: "Налаштовує видимість крізь портали для поточного гравця"
  betterportals_toggleseethroughportal:
    description: "Перемикає відображення крізь портали для поточного гравця"
  betterportals_menu:
    description: "Відкриває меню управління порталами (GUI)"
  betterportals_setprice:
    description: "Встановлює вартість використання найближчого порталу"
  betterportals_setpreset:
    description: "Встановлює візуальний ефект для найближчого порталу"

