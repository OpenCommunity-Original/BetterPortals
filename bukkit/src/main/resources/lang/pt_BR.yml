# Command translations
commands:
  betterportals_reload:
    description: "Recarrega o plugin e o arquivo de configuração"
  betterportals_reconnect:
    description: "Reconecta ao proxy se estiver desconectado"
  betterportals_removebyname:
    description: "Remove todos os portais com o nome fornecido"
  betterportals_createfromcoords:
    description: "Cria um portal a partir das coordenadas das extremidades sem precisar de um jogador"
  betterportals_remove:
    description: "Remove o portal mais próximo dentro de 20 blocos do jogador"
  betterportals_setOrigin:
    description: "Define a seleção atual da varinha de portal como sua posição de origem"
  betterportals_setDestination:
    description: "Define a seleção atual da varinha de portal como sua posição de destino"
  betterportals_linkPortals:
    description: "Conecta o portal de origem e o de destino"
  betterportals_linkExternalPortals:
    description: "Conecta a seleção de origem neste servidor com um destino em outro servidor"
  betterportals_wand:
    description: "Dá a varinha para selecionar portais"
  betterportals_setPortalName:
    description: "Define o nome do portal mais próximo em um raio de 20 blocos"
  betterportals_getportalname:
    description: "Mostra o nome do portal mais próximo em um raio de 20 blocos"
  betterportals_getallowNonPlayerTeleportation:
    description: "Mostra se o portal mais próximo em um raio de 20 blocos permite ou não a teletransportação de itens"
  betterportals_setAllowNonPlayerTeleportation:
    description: "Define se o portal mais próximo em um raio de 20 blocos permite ou não a teletransportação de itens"
  betterportals_setseethroughportal:
    description: "Define se o jogador atual é capaz de ver o que está do outro lado de um portal."
  betterportals_toggleseethroughportal:
    description: "Alterna se o jogador atual é capaz de ver o que está do outro lado de um portal."
  betterportals_menu:
    description: "Abre o menu GUI de administração de portais"
  betterportals_setprice:
    description: "Define o preço do portal mais próximo"
  betterportals_setpreset:
    description: "Define o efeito predefinido do portal mais próximo"

