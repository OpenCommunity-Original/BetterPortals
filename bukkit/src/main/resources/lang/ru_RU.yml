# Command translations
commands:
  betterportals_reload:
    description: "Перезагружает конфигурацию и плагин"
  betterportals_reconnect:
    description: "Переподключается к прокси-серверу в случае обрыва"
  betterportals_removebyname:
    description: "Удаляет все порталы с указанным именем"
  betterportals_createfromcoords:
    description: "Создает портал по координатам углов без участия игрока"
  betterportals_remove:
    description: "Удаляет ближайший портал в радиусе 20 блоков"
  betterportals_setOrigin:
    description: "Устанавливает текущее выделение палочкой как точку отправления"
  betterportals_setDestination:
    description: "Устанавливает текущее выделение палочкой как точку назначения"
  betterportals_linkPortals:
    description: "Связывает выбранные точки отправления и назначения"
  betterportals_linkExternalPortals:
    description: "Связывает точку отправления на этом сервере с точкой назначения на другом"
  betterportals_wand:
    description: "Выдает инструмент (палочку) для выделения порталов"
  betterportals_setPortalName:
    description: "Устанавливает имя для ближайшего портала в радиусе 20 блоков"
  betterportals_getportalname:
    description: "Показывает имя ближайшего портала в радиусе 20 блоков"
  betterportals_getallowNonPlayerTeleportation:
    description: "Показывает, разрешен ли телепорт мобов/предметов через ближайший портал"
  betterportals_setAllowNonPlayerTeleportation:
    description: "Настраивает разрешение на телепорт мобов/предметов через ближайший портал"
  betterportals_setseethroughportal:
    description: "Настраивает видимость сквозь порталы для текущего игрока"
  betterportals_toggleseethroughportal:
    description: "Переключает отображение сквозь порталы для текущего игрока"
  betterportals_menu:
    description: "Открывает меню управления порталами (GUI)"
  betterportals_setprice:
    description: "Устанавливает стоимость использования ближайшего портала"
  betterportals_setpreset:
    description: "Устанавливает визуальный эффект для ближайшего портала"

