# Command translations
commands:
  betterportals_reload:
    description: "Reîncarcă pluginul și fișierul de configurare"
  betterportals_reconnect:
    description: "Se reconectează la proxy dacă s-a deconectat"
  betterportals_removebyname:
    description: "Elimină toate portalele cu numele dat"
  betterportals_createfromcoords:
    description: "Creează un portal din coordonatele colțurilor sale fără a necesita un jucător"
  betterportals_remove:
    description: "Elimină cel mai apropiat portal pe o rază de 20 de blocuri de jucător"
  betterportals_setOrigin:
    description: "Setează selecția curentă a baghetei ca poziție de origine"
  betterportals_setDestination:
    description: "Setează selecția curentă a baghetei ca poziție de destinație"
  betterportals_linkPortals:
    description: "Conectează portalul de origine și cel de destinație împreună"
  betterportals_linkExternalPortals:
    description: "Conectează selecția de origine de pe acest server cu o destinație de pe alt server"
  betterportals_wand:
    description: "Îți oferă bagheta pentru selectarea portalelor"
  betterportals_setPortalName:
    description: "Setează numele celui mai apropiat portal pe o rază de 20 de blocuri"
  betterportals_getportalname:
    description: "Îți spune numele celui mai apropiat portal pe o rază de 20 de blocuri"
  betterportals_getallowNonPlayerTeleportation:
    description: "Îți spune dacă cel mai apropiat portal pe o rază de 20 de blocuri permite teleportarea obiectelor"
  betterportals_setAllowNonPlayerTeleportation:
    description: "Setează dacă cel mai apropiat portal pe o rază de 20 de blocuri permite sau nu teleportarea obiectelor"
  betterportals_setseethroughportal:
    description: "Setează dacă jucătorul curent poate vedea ce este pe partea cealaltă a unui portal."
  betterportals_toggleseethroughportal:
    description: "Comută dacă jucătorul curent poate vedea ce este pe partea cealaltă a unui portal."
  betterportals_menu:
    description: "Deschide meniul GUI de administrare a portalelor"
  betterportals_setprice:
    description: "Setează prețul celui mai apropiat portal"
  betterportals_setpreset:
    description: "Setează efectul predefinit al celui mai apropiat portal"

