# Command translations
commands:
  betterportals_reload:
    description: "טוען מחדש את התוסף ואת קובץ ההגדרות"
  betterportals_reconnect:
    description: "מתחבר מחדש לפרוקסי במידה והתנתק"
  betterportals_removebyname:
    description: "מסיר את כל הפורטלים עם השם הנתון"
  betterportals_createfromcoords:
    description: "יוצר פורטל מקואורדינטות הפינות שלו ללא צורך בשחקן"
  betterportals_remove:
    description: "מסיר את הפורטל הקרוב ביותר בטווח של 20 בלוקים מהשחקן"
  betterportals_setOrigin:
    description: "מגדיר את בחירת מטה הפורטל הנוכחית כמיקום המקור שלך"
  betterportals_setDestination:
    description: "מגדיר את בחירת מטה הפורטל הנוכחית כמיקום היעד שלך"
  betterportals_linkPortals:
    description: "מקשר את פורטל המקור ופורטל היעד יחד"
  betterportals_linkExternalPortals:
    description: "מקשר את בחירת המקור בשרת זה עם יעד בשרת אחר"
  betterportals_wand:
    description: "נותן לך את המטה לבחירת פורטלים"
  betterportals_setPortalName:
    description: "מגדיר את השם של הפורטל הקרוב ביותר בטווח של 20 בלוקים"
  betterportals_getportalname:
    description: "מציג את השם של הפורטל הקרוב ביותר בטווח של 20 בלוקים"
  betterportals_getallowNonPlayerTeleportation:
    description: "מציג האם הפורטל הקרוב ביותר בטווח של 20 בלוקים מאפשר טלפורטציה של חפצים"
  betterportals_setAllowNonPlayerTeleportation:
    description: "מגדיר האם הפורטל הקרוב ביותר בטווח של 20 בלוקים מאפשר טלפורטציה של חפצים"
  betterportals_setseethroughportal:
    description: "מגדיר האם השחקן הנוכחי יכול לראות מה יש בצד השני של הפורטל."
  betterportals_toggleseethroughportal:
    description: "משנה האם השחקן הנוכחי יכול לראות מה יש בצד השני של הפורטל."
  betterportals_menu:
    description: "פותח את תפריט הניהול של הפורטלים"
  betterportals_setprice:
    description: "מגדיר את מחיר השימוש בפורטל הקרוב ביותר"
  betterportals_setpreset:
    description: "מגדיر את ערכת האפקטים של הפורטל הקרוב ביותר"

