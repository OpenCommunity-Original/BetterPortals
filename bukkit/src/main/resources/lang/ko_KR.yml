alreadyConnected: "<red>프록시에 다시 연결할 수 없습니다: 서버가 이미 연결되어 있습니다!</red>"
horizontalIssues: "<yellow>경고: 출발지와 목적지 방향이 다른 수평 포탈은 블록 회전 문제를 일으킬 수 있습니다 - 모든 블록이 모든 방향으로 회전할 수 있는 것은 아닙니다</yellow>"
noName: "<red>이 포탈은 이름이 없습니다</red>"
