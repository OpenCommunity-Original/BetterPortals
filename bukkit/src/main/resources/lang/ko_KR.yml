# Command translations
commands:
  betterportals_reload:
    description: "플러그인 및 설정 파일을 다시 로드합니다"
  betterportals_reconnect:
    description: "연결이 끊긴 경우 프록시에 다시 연결합니다"
  betterportals_removebyname:
    description: "지정된 이름의 모든 포탈을 제거합니다"
  betterportals_createfromcoords:
    description: "플레이어 없이 모서리 좌표로 포탈을 생성합니다"
  betterportals_remove:
    description: "플레이어 기준 20블록 내에서 가장 가까운 포탈을 제거합니다"
  betterportals_setOrigin:
    description: "현재 완드로 선택된 영역을 출발지 위치로 설정합니다"
  betterportals_setDestination:
    description: "현재 완드로 선택된 영역을 목적지 위치로 설정합니다"
  betterportals_linkPortals:
    description: "출발지 포탈과 목적지 포탈을 서로 연결합니다"
  betterportals_linkExternalPortals:
    description: "이 서버의 출발지 선택 영역을 다른 서버의 목적지와 연결합니다"
  betterportals_wand:
    description: "포탈 선택용 완드를 받습니다"
  betterportals_setPortalName:
    description: "20블록 내의 가장 가까운 포탈 이름을 설정합니다"
  betterportals_getportalname:
    description: "20블록 내의 가장 가까운 포탈 이름을 확인합니다"
  betterportals_getallowNonPlayerTeleportation:
    description: "20블록 내의 가장 가까운 포탈이 아이템 이동을 허용하는지 여부를 확인합니다"
  betterportals_setAllowNonPlayerTeleportation:
    description: "20블록 내의 가장 가까운 포탈이 아이템 이동을 허용할지 여부를 설정합니다"
  betterportals_setseethroughportal:
    description: "현재 플레이어가 포탈 반대편을 볼 수 있는지 여부를 설정합니다."
  betterportals_toggleseethroughportal:
    description: "현재 플레이어가 포탈 반대편을 볼 수 있는지 여부를 토글합니다."
  betterportals_menu:
    description: "포탈 관리 GUI 메뉴를 엽니다"
  betterportals_setprice:
    description: "가장 가까운 포탈의 사용 가격을 설정합니다"
  betterportals_setpreset:
    description: "가장 가까운 포탈의 효과 프리셋을 설정합니다"

