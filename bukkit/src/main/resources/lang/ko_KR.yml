invalidBoolean: "<red>\"{arg}\"를 boolean 값으로 파싱할 수 없습니다. 도움말: 허용되는 값은 \"true\"/\"false\" 또는 \"yes\"/\"no\"입니다</red>"
differentSizes: "<red>출발지 포탈과 목적지 포탈의 크기가 같아야 합니다</red>"
noPortalCloseEnough: "<red>충분히 가까운 포탈을 찾을 수 없습니다</red>"
removeNotOwnedByPlayer: "<red>다른 사람이 생성한 포탈을 삭제할 권한이 없습니다</red>"
nameNotOwnedbyPlayer: "<red>다른 사람이 생성한 포탈의 이름을 설정할 권한이 없습니다</red>"
unknownCommand: "<red>알 수 없는 명령어입니다. 도움이 필요하면 /bp help를 실행하세요</red>"
