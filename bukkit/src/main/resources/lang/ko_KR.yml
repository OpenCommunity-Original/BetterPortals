mustSelectBothSides: "<red>먼저 포탈의 양쪽을 선택해야 합니다. 자세한 정보는 /bp help를 실행하세요</red>"
mustSelectOrigin: "<red>이 서버에서 포탈의 출발지(Origin)를 선택해야 합니다</red>"
wrongNumberOfArgs: "<red>잘못된 인수 개수입니다. 도움이 필요하면 /bp help를 실행하세요.</red>"
