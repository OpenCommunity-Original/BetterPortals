# Command translations
commands:
  betterportals_reload:
    description: "Memuat ulang plugin dan file konfigurasi"
  betterportals_reconnect:
    description: "Menghubungkan kembali ke proxy jika terputus"
  betterportals_removebyname:
    description: "Menghapus semua portal dengan nama yang diberikan"
  betterportals_createfromcoords:
    description: "Membuat portal dari koordinat sudutnya tanpa memerlukan pemain"
  betterportals_remove:
    description: "Menghapus portal terdekat dalam jarak 20 blok dari pemain"
  betterportals_setOrigin:
    description: "Menetapkan pilihan tongkat portal saat ini sebagai posisi asal Anda"
  betterportals_setDestination:
    description: "Menetapkan pilihan tongkat portal saat ini sebagai posisi tujuan Anda"
  betterportals_linkPortals:
    description: "Menghubungkan portal asal dan tujuan bersama-sama"
  betterportals_linkExternalPortals:
    description: "Menghubungkan pilihan asal di server ini dengan tujuan di server lain"
  betterportals_wand:
    description: "Memberi Anda tongkat untuk memilih portal"
  betterportals_setPortalName:
    description: "Menetapkan nama portal terdekat dalam jarak 20 blok"
  betterportals_getportalname:
    description: "Memberi tahu Anda nama portal terdekat dalam jarak 20 blok"
  betterportals_getallowNonPlayerTeleportation:
    description: "Memberi tahu Anda apakah portal terdekat dalam jarak 20 blok memungkinkan teleportasi item atau tidak"
  betterportals_setAllowNonPlayerTeleportation:
    description: "Menetapkan apakah portal terdekat dalam jarak 20 blok memungkinkan teleportasi item atau tidak"
  betterportals_setseethroughportal:
    description: "Menetapkan apakah pemain saat ini dapat melihat apa yang ada di sisi lain portal atau tidak."
  betterportals_toggleseethroughportal:
    description: "Mengaktifkan/menonaktifkan apakah pemain saat ini dapat melihat apa yang ada di sisi lain portal atau tidak."
  betterportals_menu:
    description: "Membuka menu GUI Admin Portal"
  betterportals_setprice:
    description: "Menetapkan harga portal terdekat"
  betterportals_setpreset:
    description: "Menetapkan preset efek portal terdekat"

