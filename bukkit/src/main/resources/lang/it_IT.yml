# Command translations
commands:
  betterportals_reload:
    description: "Ricarica il plugin e il file di configurazione"
  betterportals_reconnect:
    description: "Si riconnette al proxy se disconnesso"
  betterportals_removebyname:
    description: "Rimuove tutti i portali con il nome indicato"
  betterportals_createfromcoords:
    description: "Crea un portale dalle coordinate dei suoi angoli senza richiedere un giocatore"
  betterportals_remove:
    description: "Rimuove il portale più vicino entro 20 blocchi dal giocatore"
  betterportals_setOrigin:
    description: "Imposta la selezione corrente della bacchetta del portale come posizione di origine"
  betterportals_setDestination:
    description: "Imposta la selezione corrente della bacchetta del portale come posizione di destinazione"
  betterportals_linkPortals:
    description: "Collega insieme il portale di origine e quello di destinazione"
  betterportals_linkExternalPortals:
    description: "Collega la selezione di origine su questo server con una destinazione su un altro server"
  betterportals_wand:
    description: "Ti dà la bacchetta per selezionare i portali"
  betterportals_setPortalName:
    description: "Imposta il nome del portale più vicino entro 20 blocchi"
  betterportals_getportalname:
    description: "Ti dice il nome del portale più vicino entro 20 blocchi"
  betterportals_getallowNonPlayerTeleportation:
    description: "Ti dice se il portale più vicino entro 20 blocchi consente o meno il teletrasporto di oggetti"
  betterportals_setAllowNonPlayerTeleportation:
    description: "Imposta se il portale più vicino entro 20 blocchi consente o meno il teletrasporto di oggetti"
  betterportals_setseethroughportal:
    description: "Imposta se il giocatore corrente è in grado di vedere cosa c'è dall'altra parte del portale."
  betterportals_toggleseethroughportal:
    description: "Alterna se il giocatore corrente è in grado di vedere cosa c'è dall'altra parte del portale."
  betterportals_menu:
    description: "Apre il menu GUI dell'amministratore dei portali"
  betterportals_setprice:
    description: "Imposta il prezzo del portale più vicino"
  betterportals_setpreset:
    description: "Imposta il preset degli effetti del portale più vicino"

