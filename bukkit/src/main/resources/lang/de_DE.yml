# Command translations
commands:
  betterportals_reload:
    description: "Lädt das Plugin und die Konfigurationsdatei neu"
  betterportals_reconnect:
    description: "Verbindet erneut mit dem Proxy, falls getrennt"
  betterportals_removebyname:
    description: "Entfernt alle Portale mit dem angegebenen Namen"
  betterportals_createfromcoords:
    description: "Erstellt ein Portal aus den Koordinaten seiner Ecken, ohne dass ein Spieler erforderlich ist"
  betterportals_remove:
    description: "Entfernt das nächste Portal im Umkreis von 20 Blöcken um den Spieler"
  betterportals_setOrigin:
    description: "Legt die aktuelle Auswahl des Portal-Zauberstabs als Startposition fest"
  betterportals_setDestination:
    description: "Legt die aktuelle Auswahl des Portal-Zauberstabs als Zielposition fest"
  betterportals_linkPortals:
    description: "Verknüpft Start- und Zielportal miteinander"
  betterportals_linkExternalPortals:
    description: "Verknüpft die Startauswahl auf diesem Server mit einem Ziel auf einem anderen Server"
  betterportals_wand:
    description: "Gibt dir den Zauberstab zur Auswahl von Portalen"
  betterportals_setPortalName:
    description: "Legt den Namen des nächsten Portals im Umkreis von 20 Blöcken fest"
  betterportals_getportalname:
    description: "Zeigt den Namen des nächsten Portals im Umkreis von 20 Blöcken an"
  betterportals_getallowNonPlayerTeleportation:
    description: "Zeigt an, ob das nächste Portal im Umkreis von 20 Blöcken den Transport von Gegenständen erlaubt"
  betterportals_setAllowNonPlayerTeleportation:
    description: "Legt fest, ob das nächste Portal im Umkreis von 20 Blöcken den Transport von Gegenständen erlaubt"
  betterportals_setseethroughportal:
    description: "Legt fest, ob der aktuelle Spieler durch Portale hindurchsehen kann"
  betterportals_toggleseethroughportal:
    description: "Schaltet um, ob der aktuelle Spieler durch Portale hindurchsehen kann"
  betterportals_menu:
    description: "Öffnet das Portal-Admin-GUI-Menü"
  betterportals_setprice:
    description: "Legt den Preis für das nächste Portal fest"
  betterportals_setpreset:
    description: "Legt die Effekt-Voreinstellung für das nächste Portal fest"

