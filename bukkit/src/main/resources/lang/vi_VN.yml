# Command translations
commands:
  betterportals_reload:
    description: "Tải lại plugin và cấu hình"
  betterportals_reconnect:
    description: "Kết nối lại với proxy nếu bị ngắt kết nối"
  betterportals_removebyname:
    description: "Xóa tất cả các cổng có tên đã cho"
  betterportals_createfromcoords:
    description: "Tạo cổng từ tọa độ các góc của nó mà không cần người chơi"
  betterportals_remove:
    description: "Xóa cổng gần nhất trong vòng 20 khối của người chơi"
  betterportals_setOrigin:
    description: "Đặt vùng chọn hiện tại của gậy cổng làm vị trí xuất phát của bạn"
  betterportals_setDestination:
    description: "Đặt vùng chọn hiện tại của gậy cổng làm vị trí đích của bạn"
  betterportals_linkPortals:
    description: "Liên kết cổng xuất phát và cổng đích với nhau"
  betterportals_linkExternalPortals:
    description: "Liên kết điểm xuất phát trên máy chủ này với điểm đích trên máy chủ khác"
  betterportals_wand:
    description: "Đưa cho bạn gậy để lựa chọn cổng"
  betterportals_setPortalName:
    description: "Đặt tên cho cổng gần nhất trong vòng 20 khối"
  betterportals_getportalname:
    description: "Cho bạn biết tên của cổng gần nhất trong vòng 20 khối"
  betterportals_getallowNonPlayerTeleportation:
    description: "Cho biết cổng gần nhất trong vòng 20 khối có cho phép dịch chuyển vật phẩm hay không"
  betterportals_setAllowNonPlayerTeleportation:
    description: "Thiết lập xem cổng gần nhất trong vòng 20 khối có cho phép dịch chuyển vật phẩm hay không"
  betterportals_setseethroughportal:
    description: "Thiết lập xem người chơi hiện tại có thể nhìn thấy phía bên kia của cổng hay không."
  betterportals_toggleseethroughportal:
    description: "Bật/Tắt chế độ nhìn xuyên qua cổng cho người chơi hiện tại."
  betterportals_menu:
    description: "Mở menu GUI quản trị cổng"
  betterportals_setprice:
    description: "Đặt giá sử dụng cho cổng gần nhất"
  betterportals_setpreset:
    description: "Thiết lập hiệu ứng cho cổng gần nhất"

