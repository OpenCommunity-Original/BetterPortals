invalidSelection: "<red>Lựa chọn không hợp lệ! Vùng chọn portal phải nằm ở hai góc của cổng dịch chuyển</red>"
coordinatesNotInLine: "<red>Tọa độ góc đã cho (%d, %d, %d), (%d, %d, %d) không được căn chỉnh chính xác để tạo cổng phẳng (không cho phép cổng nằm chéo)</red>"
