nameNotOwnedbyPlayer: "<red>Bạn không có quyền đặt tên cho cổng dịch chuyển do người khác tạo</red>"
unknownCommand: "<red>Lệnh không xác định. Để được trợ giúp, chạy /bp help</red>"
proxyDisabled: "<red>Không thể kết nối lại với proxy: nó chưa được bật!</red>"
alreadyConnected: "<red>Không thể kết nối lại với proxy: máy chủ đã được kết nối!</red>"
horizontalIssues: "<yellow>Cảnh báo: Cổng dịch chuyển nằm ngang với các hướng đi/đích khác nhau có thể gây ra sự cố xoay khối - không phải khối nào cũng xoay được mọi hướng</yellow>"
