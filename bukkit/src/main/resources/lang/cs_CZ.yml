# Command translations
commands:
  betterportals_reload:
    description: "Znovu načte plugin a konfigurační soubor"
  betterportals_reconnect:
    description: "Znovu se připojí k proxy, pokud je odpojen"
  betterportals_removebyname:
    description: "Odstraní všechny portály s daným názvem"
  betterportals_createfromcoords:
    description: "Vytvoří portál ze souřadnic jeho rohů bez požadavku na přítomnost hráče"
  betterportals_remove:
    description: "Odstraní nejbližší portál do 20 bloků od hráče"
  betterportals_setOrigin:
    description: "Nastaví aktuální výběr portálové hůlky jako vaši počáteční pozici"
  betterportals_setDestination:
    description: "Nastaví aktuální výběr portálové hůlky jako vaši cílovou pozici"
  betterportals_linkPortals:
    description: "Propojí počáteční a cílový portál dohromady"
  betterportals_linkExternalPortals:
    description: "Propojí počáteční výběr na tomto serveru s cílem na jiném serveru"
  betterportals_wand:
    description: "Dá vám hůlku pro výběr portálů"
  betterportals_setPortalName:
    description: "Nastaví název nejbližšího portálu do 20 bloků"
  betterportals_getportalname:
    description: "Zobrazí název nejbližšího portálu do 20 bloků"
  betterportals_getallowNonPlayerTeleportation:
    description: "Zobrazí, zda nejbližší portál do 20 bloků umožňuje teleportaci předmětů"
  betterportals_setAllowNonPlayerTeleportation:
    description: "Nastaví, zda nejbližší portál do 20 bloků umožňuje teleportaci předmětů"
  betterportals_setseethroughportal:
    description: "Nastaví, zda aktuální hráč vidí na druhou stranu portálu."
  betterportals_toggleseethroughportal:
    description: "Přepne, zda aktuální hráč vidí na druhou stranu portálu."
  betterportals_menu:
    description: "Otevře administrátorské menu GUI portálů"
  betterportals_setprice:
    description: "Nastaví cenu nejbližšího portálu"
  betterportals_setpreset:
    description: "Nastaví vizuální efekt nejbližšího portálu"

