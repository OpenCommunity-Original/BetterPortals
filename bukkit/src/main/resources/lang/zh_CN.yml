# Command translations
commands:
  betterportals_reload:
    description: "重载插件和配置文件"
  betterportals_reconnect:
    description: "如果断开连接，重新连接到代理"
  betterportals_removebyname:
    description: "移除所有具有给定名称的传送门"
  betterportals_createfromcoords:
    description: "根据角落坐标创建传送门，无需玩家参与"
  betterportals_remove:
    description: "移除玩家 20 格范围内最近的传送门"
  betterportals_setOrigin:
    description: "将当前传送门魔杖选择的区域设置为起点位置"
  betterportals_setDestination:
    description: "将当前传送门魔杖选择的区域设置为终点位置"
  betterportals_linkPortals:
    description: "将起点传送门与终点传送门链接在一起"
  betterportals_linkExternalPortals:
    description: "将此服务器上的起点选择与另一个服务器上的终点链接"
  betterportals_wand:
    description: "给予您用于选择传送门的魔杖"
  betterportals_setPortalName:
    description: "设置 20 格范围内最近的传送门的名称"
  betterportals_getportalname:
    description: "告诉您 20 格范围内最近的传送门的名称"
  betterportals_getallowNonPlayerTeleportation:
    description: "告诉您 20 格范围内最近的传送门是否允许物品传送"
  betterportals_setAllowNonPlayerTeleportation:
    description: "设置 20 格范围内最近的传送门是否允许物品传送"
  betterportals_setseethroughportal:
    description: "设置当前玩家是否能够看到传送门另一侧的情况。"
  betterportals_toggleseethroughportal:
    description: "切换当前玩家是否能够看到传送门另一侧的情况。"
  betterportals_menu:
    description: "打开传送门管理员 GUI 菜单"
  betterportals_setprice:
    description: "设置最近的传送门的价格"
  betterportals_setpreset:
    description: "设置最近的传送门的特效预设"

