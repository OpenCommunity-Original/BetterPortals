# Command translations
commands:
  betterportals_reload:
    description: "プラグインと設定ファイルをリロードします"
  betterportals_reconnect:
    description: "切断されている場合、プロキシに再接続します"
  betterportals_removebyname:
    description: "指定された名前のポータルをすべて削除します"
  betterportals_createfromcoords:
    description: "プレイヤーを必要とせずに、角の座標からポータルを作成します"
  betterportals_remove:
    description: "プレイヤーから20ブロック以内にある最も近いポータルを削除します"
  betterportals_setOrigin:
    description: "現在のワンドの選択を始点位置として設定します"
  betterportals_setDestination:
    description: "現在のワンドの選択を終点位置として設定します"
  betterportals_linkPortals:
    description: "始点と終点のポータルをリンクします"
  betterportals_linkExternalPortals:
    description: "このサーバー上の始点の選択を別のサーバー上の終点とリンクします"
  betterportals_wand:
    description: "ポータルを選択するためのワンドを付与します"
  betterportals_setPortalName:
    description: "20ブロック以内にある最も近いポータルの名前を設定します"
  betterportals_getportalname:
    description: "20ブロック以内にある最も近いポータルの名前を表示します"
  betterportals_getallowNonPlayerTeleportation:
    description: "20ブロック以内にある最も近いポータルがアイテムのテレポートを許可しているかどうかを表示します"
  betterportals_setAllowNonPlayerTeleportation:
    description: "20ブロック以内にある最も近いポータルがアイテムのテレポートを許可するかどうかを設定します"
  betterportals_setseethroughportal:
    description: "現在のプレイヤーがポータルの反対側を見通せるかどうかを設定します。"
  betterportals_toggleseethroughportal:
    description: "現在のプレイヤーがポータルの反対側を見通せるかどうかを切り替えます。"
  betterportals_menu:
    description: "ポータル管理GUIメニューを開きます"
  betterportals_setprice:
    description: "最も近いポータルの価格を設定します"
  betterportals_setpreset:
    description: "最も近いポータルのエフェクトプリセットを設定します"

