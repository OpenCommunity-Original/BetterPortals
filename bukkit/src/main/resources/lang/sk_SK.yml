# Command translations
commands:
  betterportals_reload:
    description: "Znova načíta plugin a konfiguračný súbor"
  betterportals_reconnect:
    description: "Znova se pripojí k proxy, ak je odpojený"
  betterportals_removebyname:
    description: "Odstráni všetky portály s daným názvom"
  betterportals_createfromcoords:
    description: "Vytvorí portál zo súradníc jeho rohov bez požiadavky na prítomnosť hráča"
  betterportals_remove:
    description: "Odstráni najbližší portál do 20 blokov od hráča"
  betterportals_setOrigin:
    description: "Nastaví aktuálny výber portálovej paličky ako vašu počiatočnú pozíciu"
  betterportals_setDestination:
    description: "Nastaví aktuálny výber portálovej paličky ako vašu cieľovú pozíciu"
  betterportals_linkPortals:
    description: "Prepojí počiatočný a cieľový portál dohromady"
  betterportals_linkExternalPortals:
    description: "Prepojí počiatočný výber na tomto serveri s cieľom na inom serveri"
  betterportals_wand:
    description: "Dá vám paličku pre výber portálov"
  betterportals_setPortalName:
    description: "Nastaví názov najbližšieho portálu do 20 blokov"
  betterportals_getportalname:
    description: "Zobrazí názov najbližšieho portálu do 20 blokov"
  betterportals_getallowNonPlayerTeleportation:
    description: "Zobrazí, či najbližší portál do 20 blokov umožňuje teleportáciu predmetov"
  betterportals_setAllowNonPlayerTeleportation:
    description: "Nastaví, či najbližší portál do 20 blokov umožňuje teleportáciu predmetov"
  betterportals_setseethroughportal:
    description: "Nastaví, či aktuálny hráč vidí na druhú stranu portálu."
  betterportals_toggleseethroughportal:
    description: "Prepne, či aktuálny hráč vidí na druhú stranu portálu."
  betterportals_menu:
    description: "Otvorí administrátorské menu GUI portálov"
  betterportals_setprice:
    description: "Nastaví cenu najbližšieho portálu"
  betterportals_setpreset:
    description: "Nastaví vizuálny efekt najbližšieho portálu"

