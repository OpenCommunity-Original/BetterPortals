# Command translations
commands:
  betterportals_reload:
    description: "Herlaadt de plugin en het configuratiebestand"
  betterportals_reconnect:
    description: "Verbindt opnieuw met de proxy indien losgekoppeld"
  betterportals_removebyname:
    description: "Verwijdert alle portalen met de opgegeven naam"
  betterportals_createfromcoords:
    description: "Maakt een portaal van de coördinaten van de hoeken zonder een speler te vereisen"
  betterportals_remove:
    description: "Verwijdert het dichtstbijzijnde portaal binnen 20 blokken van de speler"
  betterportals_setOrigin:
    description: "Stelt de huidige portaalwand-selectie in als je startpositie"
  betterportals_setDestination:
    description: "Stelt de huidige portaalwand-selectie in als je bestemmingspositie"
  betterportals_linkPortals:
    description: "Koppelt het start- en bestemmingsportaal aan elkaar"
  betterportals_linkExternalPortals:
    description: "Koppelt de startselectie op deze server met een bestemming op een andere server"
  betterportals_wand:
    description: "Geeft je de wand om portalen te selecteren"
  betterportals_setPortalName:
    description: "Stelt de naam in van het dichtstbijzijnde portaal binnen 20 blokken"
  betterportals_getportalname:
    description: "Vertelt je de naam van het dichtstbijzijnde portaal binnen 20 blokken"
  betterportals_getallowNonPlayerTeleportation:
    description: "Vertelt je of het dichtstbijzijnde portaal binnen 20 blokken item-teleportatie toestaat"
  betterportals_setAllowNonPlayerTeleportation:
    description: "Stelt in of het dichtstbijzijnde portaal binnen 20 blokken item-teleportatie toestaat"
  betterportals_setseethroughportal:
    description: "Stelt in of de huidige speler door het portaal heen kan kijken."
  betterportals_toggleseethroughportal:
    description: "Schakelt in of uit of de huidige speler door het portaal heen kan kijken."
  betterportals_menu:
    description: "Opent het Portal Admin GUI-menu"
  betterportals_setprice:
    description: "Stelt de prijs in van het dichtstbijzijnde portaal"
  betterportals_setpreset:
    description: "Stelt de effect-preset in van het dichtstbijzijnde portaal"

