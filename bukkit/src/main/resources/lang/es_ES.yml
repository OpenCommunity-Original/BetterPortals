# Command translations
commands:
  betterportals_reload:
    description: "Recarga el plugin y el archivo de configuración"
  betterportals_reconnect:
    description: "Se reconecta al proxy si está desconectado"
  betterportals_removebyname:
    description: "Elimina todos los portales con el nombre dado"
  betterportals_createfromcoords:
    description: "Crea un portal a partir de las coordenadas de sus esquinas sin requerir a un jugador"
  betterportals_remove:
    description: "Elimina el portal más cercano dentro de un radio de 20 bloques del jugador"
  betterportals_setOrigin:
    description: "Establece la selección actual de la varita de portal como tu posición de origen"
  betterportals_setDestination:
    description: "Establece la selección actual de la varita de portal como tu posición de destino"
  betterportals_linkPortals:
    description: "Vincula el portal de origen y el de destino"
  betterportals_linkExternalPortals:
    description: "Vincula la selección de origen en este servidor con un destino en otro servidor"
  betterportals_wand:
    description: "Te da la varita para seleccionar portales"
  betterportals_setPortalName:
    description: "Establece el nombre del portal más cercano dentro de un radio de 20 bloques"
  betterportals_getportalname:
    description: "Te dice el nombre del portal más cercano dentro de un radio de 20 bloques"
  betterportals_getallowNonPlayerTeleportation:
    description: "Te dice si el portal más cercano dentro de un radio de 20 bloques permite o no la teletransportación de objetos"
  betterportals_setAllowNonPlayerTeleportation:
    description: "Establece si el portal más cercano dentro de un radio de 20 bloques permite o no la teletransportación de objetos"
  betterportals_setseethroughportal:
    description: "Establece si el jugador actual puede ver o no lo que hay al otro lado de un portal."
  betterportals_toggleseethroughportal:
    description: "Alterna si el jugador actual puede ver o no lo que hay al otro lado de un portal."
  betterportals_menu:
    description: "Abre el menú de la interfaz gráfica de administración de portales"
  betterportals_setprice:
    description: "Establece el precio del portal más cercano"
  betterportals_setpreset:
    description: "Establece el ajuste preestablecido de efectos del portal más cercano"

