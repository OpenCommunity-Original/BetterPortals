# Command translations
commands:
  betterportals_reload:
    description: "Laddar om pluginet och konfigurationsfilen"
  betterportals_reconnect:
    description: "Ansluter till proxyn igen om anslutningen brutits"
  betterportals_removebyname:
    description: "Tar bort alla portaler med det angivna namnet"
  betterportals_createfromcoords:
    description: "Skapar en portal från koordinaterna för dess hörn utan att kräva en spelare"
  betterportals_remove:
    description: "Tar bort den närmaste portalen inom 20 block från spelaren"
  betterportals_setOrigin:
    description: "Ställer in den aktuella portalstavs-markeringen som din startposition"
  betterportals_setDestination:
    description: "Ställer in den aktuella portalstavs-markeringen som din destinationsposition"
  betterportals_linkPortals:
    description: "Länkar samman startportalen och destinationsportalen"
  betterportals_linkExternalPortals:
    description: "Länkar startmarkeringen på den här servern med en destination på en annan server"
  betterportals_wand:
    description: "Ger dig staven för att välja portaler"
  betterportals_setPortalName:
    description: "Ställer in namnet på den närmaste portalen inom 20 block"
  betterportals_getportalname:
    description: "Visar namnet på den närmaste portalen inom 20 block"
  betterportals_getallowNonPlayerTeleportation:
    description: "Visar om den närmaste portalen inom 20 block tillåter föremålsteleportation"
  betterportals_setAllowNonPlayerTeleportation:
    description: "Ställer in om den närmaste portalen inom 20 block tillåter föremålsteleportation"
  betterportals_setseethroughportal:
    description: "Ställer in om den nuvarande spelaren kan se igenom portaler."
  betterportals_toggleseethroughportal:
    description: "Växlar om den nuvarande spelaren kan se igenom portaler."
  betterportals_menu:
    description: "Öppnar Portal Admin GUI-menyn"
  betterportals_setprice:
    description: "Ställer in priset för den närmaste portalen"
  betterportals_setpreset:
    description: "Ställer in effektinställningen för den närmaste portalen"

