# Command translations
commands:
  betterportals_reload:
    description: "Újratölti a plugint és a konfigurációs fájlt"
  betterportals_reconnect:
    description: "Újracsatlakozik a proxyhoz, ha megszakadt a kapcsolat"
  betterportals_removebyname:
    description: "Eltávolítja az összes megadott nevű portált"
  betterportals_createfromcoords:
    description: "Létrehoz egy portált a sarkaiból játékos jelenléte nélkül"
  betterportals_remove:
    description: "Eltávolítja a legközelebbi portált a játékos 20 blokkos körzetében"
  betterportals_setOrigin:
    description: "Beállítja a jelenlegi pálcakijelölést kiindulási pozíciónak"
  betterportals_setDestination:
    description: "Beállítja a jelenlegi pálcakijelölést célpozíciónak"
  betterportals_linkPortals:
    description: "Összekapcsolja a kiindulási és a célportált"
  betterportals_linkExternalPortals:
    description: "Összekapcsolja a szervereden lévő kijelölést egy másik szerveren lévő célponttal"
  betterportals_wand:
    description: "Kézbe adja a kijelöléshez szükséges pálcát"
  betterportals_setPortalName:
    description: "Beállítja a legközelebbi portál nevét 20 blokkon belül"
  betterportals_getportalname:
    description: "Megmondja a legközelebbi portál nevét 20 blokkon belül"
  betterportals_getallowNonPlayerTeleportation:
    description: "Megmondja, hogy a legközelebbi portál engedélyezi-e a tárgyak teleportálását"
  betterportals_setAllowNonPlayerTeleportation:
    description: "Beállítja, hogy a legközelebbi portál engedélyezze-e a tárgyak teleportálását"
  betterportals_setseethroughportal:
    description: "Beállítja, hogy a jelenlegi játékos átlásson-e a portálokon."
  betterportals_toggleseethroughportal:
    description: "Átkapcsolja, hogy a jelenlegi játékos átlásson-e a portálokon."
  betterportals_menu:
    description: "Megnyitja a Portál Admin GUI menüt"
  betterportals_setprice:
    description: "Beállítja a legközelebbi portál használati díját"
  betterportals_setpreset:
    description: "Beállítja a legközelebbi portál effekt-előbeállítását"

