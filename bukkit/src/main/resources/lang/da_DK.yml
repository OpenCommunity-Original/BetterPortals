# Command translations
commands:
  betterportals_reload:
    description: "Genindlæser pluginet og konfigurationsfilen"
  betterportals_reconnect:
    description: "Genopretter forbindelse til proxyen, hvis den er afbrudt"
  betterportals_removebyname:
    description: "Fjerner alle portaler med det angivne navn"
  betterportals_createfromcoords:
    description: "Opretter en portal ud fra koordinaterne på dens hjørner uden at kræve en spiller"
  betterportals_remove:
    description: "Fjerner den nærmeste portal inden for 20 blokke fra spilleren"
  betterportals_setOrigin:
    description: "Indstiller det aktuelle portalstavsvalg som din startposition"
  betterportals_setDestination:
    description: "Indstiller det aktuelle portalstavsvalg som din destinationsposition"
  betterportals_linkPortals:
    description: "Linker startportalen og destinationsportalen sammen"
  betterportals_linkExternalPortals:
    description: "Linker startvalget på denne server med en destination på en anden server"
  betterportals_wand:
    description: "Giver dig staven til at vælge portaler"
  betterportals_setPortalName:
    description: "Indstiller navnet på den nærmeste portal inden for 20 blokke"
  betterportals_getportalname:
    description: "Viser navnet på den nærmeste portal inden for 20 blokke"
  betterportals_getallowNonPlayerTeleportation:
    description: "Viser om den nærmeste portal inden for 20 blokke tillader genstandsteleportering"
  betterportals_setAllowNonPlayerTeleportation:
    description: "Indstiller om den nærmeste portal inden for 20 blokke tillader genstandsteleportering"
  betterportals_setseethroughportal:
    description: "Indstiller om den aktuelle spiller kan se gennem portaler."
  betterportals_toggleseethroughportal:
    description: "Skifter om den aktuelle spiller kan se gennem portaler."
  betterportals_menu:
    description: "Åbner Portal Admin GUI-menuen"
  betterportals_setprice:
    description: "Indstiller prisen for den nærmeste portal"
  betterportals_setpreset:
    description: "Indstiller effektforudindstillingen for den nærmeste portal"

