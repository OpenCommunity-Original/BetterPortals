name: Java CI

on: [push]

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Cache gradle data
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ secrets.CACHE_SUFFIX }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ secrets.CACHE_SUFFIX }}-

      - name: Determine Release Info
        id: release_info
        run: |
          VERSION=$(sed -n "s/.*versionName\s*=\s*['\"]\(.*\)['\"].*/\1/p" settings.gradle)
          if [ -z "$VERSION" ]; then
            VERSION="1.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [ -z "$COMMIT_MSG" ]; then
            COMMIT_MSG="Manual release"
          fi
          
          COMMIT_MSG_LOWER=$(echo "$COMMIT_MSG" | tr '[:upper:]' '[:lower:]')
          
          if [[ "$COMMIT_MSG_LOWER" == *"release"* ]]; then
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "tag_name=v$VERSION" >> $GITHUB_OUTPUT
            echo "release_name=Release v$VERSION" >> $GITHUB_OUTPUT
            echo "bp_developer_build=0" >> $GITHUB_OUTPUT
          else
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "tag_name=v$VERSION-beta.${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "release_name=Beta v$VERSION-beta.${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "bp_developer_build=1" >> $GITHUB_OUTPUT
          fi

      - name: Build with Gradle
        run: ./gradlew clean build
        env:
          BP_DEVELOPER_BUILD: ${{ steps.release_info.outputs.bp_developer_build }}

      - uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: final/build/libs/*all.jar

      - name: Create GitHub Release
        if: ${{ github.ref == 'refs/heads/master' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag_name }}
          name: ${{ steps.release_info.outputs.release_name }}
          prerelease: ${{ steps.release_info.outputs.prerelease }}
          files: final/build/libs/*all.jar
          generate_release_notes: true
          body: |
            Automated build for commit: ${{ github.event.head_commit.message }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short sha
        if: ${{ github.ref == 'refs/heads/master' }}
        id: get_sha
        run: |
          echo "SHORT_SHA=$(git rev-parse HEAD | cut -c 1-8)" >> $GITHUB_OUTPUT

      - name: Set Publish JAR
        if: ${{ github.ref == 'refs/heads/master' }}
        run: echo "PUBLISH_JAR=$(find final/build/libs/*all.jar -print -quit)" >> $GITHUB_ENV

      - name: Publish JAR to webhook
        if: ${{ github.ref == 'refs/heads/master' }}
        uses: tsickert/discord-webhook@v3.2.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          content: "`${{ steps.get_sha.outputs.SHORT_SHA }}` - `${{ github.event.head_commit.message }}`"
          username: "BetterPortals Dev Builds"
          avatar-url: "https://i.imgur.com/4l67APG.png"
          filename: ${{ env.PUBLISH_JAR }}

      - name: Stop gradle daemons
        run: ./gradlew --stop